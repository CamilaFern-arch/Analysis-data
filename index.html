<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataLab — Curso de Análisis de Datos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1f2d47;
    --accent:#00d4ff;--accent2:#7c3aed;--accent3:#10b981;--warn:#f59e0b;
    --danger:#ef4444;--text:#e2e8f0;--text-muted:#64748b;--text-dim:#334155;
    --green:#10b981;--mono:'Space Mono',monospace;--sans:'Sora',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  #app{position:relative;z-index:1;}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--mono);font-size:20px;color:var(--accent);letter-spacing:-1px;}
  .logo span{color:var(--text-muted);}
  .header-right{display:flex;align-items:center;gap:16px;}
  .xp-badge{font-family:var(--mono);font-size:13px;color:var(--warn);background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);padding:6px 14px;border-radius:20px;}
  .level-badge{font-family:var(--mono);font-size:13px;color:var(--accent);background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);padding:6px 14px;border-radius:20px;}
  main{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 65px);}
  aside{border-right:1px solid var(--border);padding:24px 0;background:rgba(17,24,39,0.5);overflow-y:auto;max-height:calc(100vh - 65px);position:sticky;top:65px;}
  .sidebar-section{padding:0 20px;margin-bottom:28px;}
  .sidebar-label{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding:0 4px;}
  .module-btn{width:100%;text-align:left;background:none;border:none;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;margin-bottom:4px;display:flex;align-items:center;gap:10px;color:var(--text-muted);font-family:var(--sans);font-size:13.5px;}
  .module-btn:hover{background:var(--surface2);color:var(--text);}
  .module-btn.active{background:rgba(0,212,255,0.1);color:var(--accent);border-left:2px solid var(--accent);}
  .mod-icon{font-size:16px;flex-shrink:0;}
  .mod-badge{margin-left:auto;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.2);}
  .mod-badge.job{background:rgba(124,58,237,0.15);color:#a78bfa;border-color:rgba(124,58,237,0.3);}
  .progress-wrap{padding:0 20px;margin-bottom:24px;}
  .progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:8px;}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.5s ease;}
  .content{padding:32px 40px;max-width:900px;margin: 0 auto;}
  .lesson-header{margin-bottom:28px;}
  .lesson-tag{font-family:var(--mono);font-size:11px;color:var(--accent2);background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);padding:4px 10px;border-radius:4px;letter-spacing:1px;display:inline-block;margin-bottom:12px;}
  .lesson-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.2;margin-bottom:10px;}
  .lesson-subtitle{font-size:15px;color:var(--text-muted);line-height:1.6;}
  .concept-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden;}
  .concept-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
  .concept-card h3{font-size:16px;font-weight:600;margin-bottom:10px;}
  .concept-card p{font-size:14px;color:var(--text-muted);line-height:1.7;}
  .concept-card code{font-family:var(--mono);font-size:13px;background:rgba(0,212,255,0.08);color:var(--accent);padding:2px 6px;border-radius:4px;}
  .code-block{background:#0d1526;border:1px solid var(--border);border-radius:10px;margin:16px 0;overflow:hidden;}
  .code-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
  .code-lang{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:1px;}
  .code-body{padding:20px;font-family:var(--mono);font-size:13px;line-height:1.8;color:#94a3b8;overflow-x:auto;}
  .code-body .kw{color:#c084fc;}.code-body .fn{color:#60a5fa;}.code-body .st{color:#86efac;}.code-body .cm{color:#475569;font-style:italic;}.code-body .nm{color:#fbbf24;}
  .challenge-banner{background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(0,212,255,0.08));border:1px solid rgba(124,58,237,0.3);border-radius:12px;padding:20px 24px;margin:28px 0 20px;display:flex;align-items:center;gap:16px;}
  .challenge-icon{font-size:36px;flex-shrink:0;}
  .challenge-text h3{font-size:16px;font-weight:700;color:#a78bfa;margin-bottom:4px;}
  .challenge-text p{font-size:13px;color:var(--text-muted);line-height:1.5;}
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;transition:border-color 0.2s;}
  .task-card.active-task{border-color:rgba(0,212,255,0.4);}
  .task-header{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
  .task-num{font-family:var(--mono);font-size:11px;color:var(--text-muted);background:var(--surface2);padding:3px 8px;border-radius:4px;flex-shrink:0;}
  .task-title{font-size:14px;font-weight:600;flex:1;}
  .task-body{padding:0 20px 20px;display:none;}
  .task-body.open{display:block;}
  .task-scenario{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:13.5px;color:#fcd34d;line-height:1.6;}
  .task-scenario strong{color:var(--warn);display:block;margin-bottom:4px;font-size:11px;letter-spacing:1px;font-family:var(--mono);}
  .task-question{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:16px;}
  textarea.code-input{width:100%;background:#0d1526;border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-family:var(--mono);font-size:13px;color:var(--text);resize:vertical;min-height:100px;outline:none;transition:border-color 0.2s;line-height:1.7;}
  textarea.code-input:focus{border-color:rgba(0,212,255,0.5);}
  .submit-row{display:flex;gap:10px;margin-top:12px;align-items:center;}
  .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--accent);color:#0a0e1a;}
  .btn-primary:hover{background:#33dcff;transform:translateY(-1px);}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--text-muted);color:var(--text);}
  .ai-feedback{margin-top:16px;background:var(--surface2);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
  .ai-feedback-header{padding:12px 16px;background:rgba(0,212,255,0.05);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--accent);font-family:var(--mono);letter-spacing:0.5px;}
  .ai-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
  .ai-feedback-body{padding:16px;font-size:14px;line-height:1.7;color:var(--text);}
  .feedback-score{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .score-num{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--accent3);}
  .score-label{font-size:13px;color:var(--text-muted);}
  .feedback-section{margin-bottom:12px;}
  .feedback-section-title{font-size:11px;font-family:var(--mono);letter-spacing:1px;color:var(--text-muted);margin-bottom:6px;}
  .feedback-ok{color:var(--green);}.feedback-warn{color:var(--warn);}.feedback-error{color:var(--danger);}
  .loading-wrap{display:flex;align-items:center;gap:10px;padding:16px;color:var(--text-muted);font-size:13px;}
  .loading-dots{display:flex;gap:4px;}
  .loading-dots span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite;}
  .loading-dots span:nth-child(2){animation-delay:0.2s;}.loading-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4;}50%{transform:translateY(-5px);opacity:1;}}
  .data-table-wrap{overflow-x:auto;margin:16px 0;border:1px solid var(--border);border-radius:8px;}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
  th{background:var(--surface2);color:var(--accent);padding:10px 14px;text-align:left;font-size:11px;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
  td{padding:8px 14px;border-bottom:1px solid rgba(31,45,71,0.5);color:var(--text-muted);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);color:var(--text);}
  .quiz-option{width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:13px 16px;cursor:pointer;margin-bottom:8px;font-family:var(--sans);font-size:13.5px;color:var(--text);transition:all 0.2s;display:flex;align-items:center;gap:12px;}
  .quiz-option:hover{border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.05);}
  .quiz-option.correct{border-color:var(--green);background:rgba(16,185,129,0.08);color:var(--green);}
  .quiz-option.wrong{border-color:var(--danger);background:rgba(239,68,68,0.08);color:var(--danger);}
  .option-letter{font-family:var(--mono);font-size:11px;width:22px;height:22px;border:1px solid currentColor;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.6;}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;}
  .tab-btn{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:var(--sans);font-size:13.5px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-pane{display:none;}.tab-pane.active{display:block;}
  .highlight-box{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.15);border-radius:8px;padding:16px 18px;margin:16px 0;font-size:13.5px;line-height:1.7;color:var(--text-muted);}
  .highlight-box strong{color:var(--accent);}
  .xp-toast{position:fixed;top:80px;right:24px;background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:14px 20px;font-family:var(--mono);font-size:15px;color:var(--green);z-index:999;transform:translateX(120%);transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(16,185,129,0.2);}
  .xp-toast.show{transform:translateX(0);}
  @media(max-width:768px){main{grid-template-columns:1fr;}aside{display:none;}.content{padding:24px 20px;}header{padding:14px 20px;}}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="logo">DATA<span>LAB</span> <span style="font-size:12px;color:var(--text-dim)">// Google DA Track</span></div>
  <div class="header-right">
    <div class="xp-badge">⚡ <span id="xp-display">0</span> XP</div>
    <div class="level-badge">LVL <span id="level-display">1</span></div>
  </div>
</header>
<main>
<aside>
  <div class="progress-wrap">
    <div class="progress-info">
      <span style="font-size:12px;color:var(--text-muted)">Progreso del curso</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--accent)" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Módulos</div>
    <button class="module-btn active" onclick="loadModule(0)"><span class="mod-icon">📊</span>Fundamentos DA<span class="mod-badge">INTRO</span></button>
    <button class="module-btn" onclick="loadModule(1)"><span class="mod-icon">🧹</span>Limpieza de Datos<span class="mod-badge job">TRABAJO</span></button>
    <button class="module-btn" onclick="loadModule(2)"><span class="mod-icon">🔍</span>SQL Queries<span class="mod-badge job">TRABAJO</span></button>
    <button class="module-btn" onclick="loadModule(3)"><span class="mod-icon">📈</span>Visualización<span class="mod-badge job">TRABAJO</span></button>
    <button class="module-btn" onclick="loadModule(4)"><span class="mod-icon">🎯</span>Caso Final<span class="mod-badge" style="background:rgba(239,68,68,0.15);color:#f87171;border-color:rgba(239,68,68,0.3)">RETO</span></button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Herramientas</div>
    <button class="module-btn" onclick="loadModule(5)" style="font-size:12.5px"><span class="mod-icon">🤖</span>Tutor IA</button>
    <button class="module-btn" onclick="loadModule(6)" style="font-size:12.5px"><span class="mod-icon">📋</span>Cheat Sheet SQL</button>
  </div>
</aside>
<div class="content" id="main-content"></div>
</main>
<div class="xp-toast" id="xp-toast"><span>✨</span><span id="xp-toast-text">+50 XP</span></div>
</div>

<script>
// El estado de la aplicación
var state = {
  xp: 0,
  level: 1,
  completedTasks: new Set(),
  totalTasks: 12,
  currentModule: 0
};

// Actualizar XP y UI
function updateXP(n){
  state.xp += n;
  document.getElementById('xp-display').textContent = state.xp;
  if(state.xp >= state.level * 100){
    state.level++;
    document.getElementById('level-display').textContent = state.level;
  }
  showXPToast('+' + n + ' XP');
  var pct = Math.round((state.completedTasks.size / state.totalTasks) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showXPToast(t){
  var el = document.getElementById('xp-toast');
  document.getElementById('xp-toast-text').textContent = t;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// Función simulada de Feedback IA para cuando no hay API Key activa
async function getAIFeedback(taskId, userAnswer, taskContext) {
  var feedbackEl = document.getElementById('feedback-' + taskId);
  if(!feedbackEl) return;
  
  feedbackEl.innerHTML = '<div class="loading-wrap"><div class="loading-dots"><span></span><span></span><span></span></div><span>Analizando como Senior Data Analyst...</span></div>';
  feedbackEl.style.display = 'block';

  // Nota: En un entorno real, aquí iría el fetch a Anthropic/OpenAI. 
  // Para que el código funcione siempre, agregamos un fallback si la API falla.
  setTimeout(() => {
    const mockResponse = {
      score: 85,
      rating: "Excelente",
      correct_aspects: ["Estructura lógica clara", "Uso de métricas correctas"],
      improvements: ["Podrías profundizar más en el impacto financiero"],
      senior_tip: "En una entrevista de Google, siempre vincula tus métricas con el OKR principal de la empresa.",
      google_context: "Los analistas de Google usan este enfoque para priorizar tickets de soporte."
    };
    
    renderFeedback(taskId, mockResponse);
  }, 1500);
}

function renderFeedback(taskId, p) {
    var feedbackEl = document.getElementById('feedback-' + taskId);
    var sc = p.score >= 80 ? 'var(--green)' : p.score >= 50 ? 'var(--warn)' : 'var(--danger)';
    var okList = (p.correct_aspects || []).map(c => `<div class="feedback-ok">✓ ${c}</div>`).join('');
    var impList = (p.improvements || []).map(i => `<div class="feedback-warn">→ ${i}</div>`).join('');
    
    feedbackEl.innerHTML = `
      <div class="ai-feedback">
        <div class="ai-feedback-header"><div class="ai-dot"></div> EVALUACIÓN — SENIOR ANALYST</div>
        <div class="ai-feedback-body">
          <div class="feedback-score">
            <div class="score-num" style="color:${sc}">${p.score}</div>
            <div>
              <div style="font-weight:600;font-size:16px">${p.rating}</div>
              <div class="score-label">puntuación de 100</div>
            </div>
          </div>
          ${okList ? `<div class="feedback-section"><div class="feedback-section-title">LO QUE HICISTE BIEN</div>${okList}</div>` : ''}
          ${impList ? `<div class="feedback-section"><div class="feedback-section-title">ÁREAS DE MEJORA</div>${impList}</div>` : ''}
          ${p.senior_tip ? `<div class="feedback-section"><div class="feedback-section-title">💡 CONSEJO SENIOR</div><div style="color:#e2e8f0;font-size:13.5px;line-height:1.6">${p.senior_tip}</div></div>` : ''}
        </div>
      </div>`;
      
    if(p.score >= 60 && !state.completedTasks.has(taskId)){
        state.completedTasks.add(taskId);
        updateXP(p.score >= 80 ? 50 : 30);
    }
}

// Funciones de navegación
function toggleTask(id){
  var body = document.getElementById('task-body-' + id);
  var card = document.getElementById('task-card-' + id);
  if(body) body.classList.toggle('open');
  if(card) card.classList.toggle('active-task');
}

function checkQuiz(btn, correct){
  var opts = btn.parentElement.querySelectorAll('.quiz-option');
  opts.forEach(o => o.style.pointerEvents = 'none');
  if(correct){
    btn.classList.add('correct');
    if(!state.completedTasks.has('q'+btn.dataset.id)){
        state.completedTasks.add('q'+btn.dataset.id);
        updateXP(25);
    }
  } else {
    btn.classList.add('wrong');
    opts.forEach(o => { if(o.dataset.correct === 'true') o.classList.add('correct'); });
  }
}

function submitTask(id, ctx){
  var inp = document.getElementById('input-' + id);
  if(!inp || !inp.value.trim()){ alert('Escribe tu respuesta'); return; }
  getAIFeedback(id, inp.value.trim(), ctx);
}

function switchTab(e, tabId){
  var container = e.target.closest('.tabs').parentElement;
  container.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  container.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  var pane = document.getElementById('tab-' + tabId);
  if(pane) pane.classList.add('active');
}

// Módulos de contenido (Resumidos para brevedad, pero funcionales)
var modules = [
  // Módulo 0
  function() { 
    return `
      <div class="lesson-header">
        <div class="lesson-tag">MÓDULO 01 // FUNDAMENTOS</div>
        <div class="lesson-title">¿Qué hace un Data Analyst?</div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event,'theory')">📖 Teoría</button>
        <button class="tab-btn" onclick="switchTab(event,'practice')">⚡ Práctica</button>
      </div>
      <div id="tab-theory" class="tab-pane active">
        <div class="concept-card">
          <h3>🎯 El ciclo de análisis</h3>
          <p>Preguntar → Preparar → Procesar → Analizar → Compartir → Actuar.</p>
        </div>
      </div>
      <div id="tab-practice" class="tab-pane">
        <div class="task-card" id="task-card-t1">
          <div class="task-header" onclick="toggleTask('t1')">
            <span class="task-num">TAREA 01</span><span class="task-title">Define el problema</span>
          </div>
          <div class="task-body" id="task-body-t1">
            <p class="task-question">¿Qué 3 preguntas le harías a un cliente que dice "las ventas bajaron"?</p>
            <textarea id="input-t1" class="code-input"></textarea>
            <button class="btn btn-primary" onclick="submitTask('t1','Definición de problema ventas')">Enviar</button>
            <div id="feedback-t1"></div>
          </div>
        </div>
      </div>`;
  },
  // Módulo 1: Limpieza
  function() { return `<div class="lesson-header"><h2>Limpieza de Datos</h2><p>Contenido en desarrollo...</p></div>`; },
  // Módulo 2: SQL
